<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="26" fill="url(#bg)"/>

  <!-- ₹ symbol, centered on left half -->
  <text x="32" y="83" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="white">₹</text>

  <!-- $ symbol, centered on right half -->
  <text x="96" y="83" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="white">$</text>

  <!-- → arrow (top, ₹ to $) -->
  <line x1="52" y1="57" x2="65" y2="57" stroke="#fbbf24" stroke-width="4" stroke-linecap="round"/>
  <polyline points="62,51 71,57 62,63" fill="none" stroke="#fbbf24" stroke-width="4"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ← arrow (bottom, $ to ₹) -->
  <line x1="76" y1="71" x2="63" y2="71" stroke="#fbbf24" stroke-width="4" stroke-linecap="round"/>
  <polyline points="66,65 57,71 66,77" fill="none" stroke="#fbbf24" stroke-width="4"
            stroke-linecap="round" stroke-linejoin="round"/>
</svg>
