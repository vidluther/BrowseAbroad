name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Verify tag matches manifest version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          tag_version="${REF_NAME#v}"
          manifest_version=$(node -p "require('./manifest.firefox.json').version")
          chrome_version=$(node -p "require('./manifest.chrome.json').version")
          pkg_version=$(node -p "require('./package.json').version")
          if [ "$tag_version" != "$manifest_version" ] || [ "$tag_version" != "$chrome_version" ] || [ "$tag_version" != "$pkg_version" ]; then
            echo "Version mismatch:"
            echo "  tag:                  $tag_version"
            echo "  manifest.firefox.json: $manifest_version"
            echo "  manifest.chrome.json:  $chrome_version"
            echo "  package.json:          $pkg_version"
            echo "Run 'pnpm version:bump' before tagging."
            exit 1
          fi
          echo "All four agree on version $tag_version"

      - run: pnpm test

      - name: Build both extensions
        run: pnpm build

      - name: Lint Firefox build
        run: pnpm lint:firefox

      - name: Package Chrome zip
        run: pnpm package:chrome

      - name: Sign Firefox XPI (Mozilla, unlisted channel)
        env:
          WEB_EXT_API_KEY: ${{ secrets.WEB_EXT_API_KEY }}
          WEB_EXT_API_SECRET: ${{ secrets.WEB_EXT_API_SECRET }}
        run: |
          if [ -z "$WEB_EXT_API_KEY" ] || [ -z "$WEB_EXT_API_SECRET" ]; then
            echo "ERROR: WEB_EXT_API_KEY and WEB_EXT_API_SECRET must be set as repo secrets."
            echo "Generate them at https://addons.mozilla.org/en-US/developers/addon/api/key/"
            exit 1
          fi
          pnpm exec web-ext sign \
            --source-dir=dist/firefox \
            --artifacts-dir=dist/signed \
            --channel=unlisted

      - name: Locate signed XPI
        id: xpi
        run: |
          xpi=$(ls dist/signed/*.xpi | head -n1)
          if [ -z "$xpi" ]; then
            echo "No signed XPI produced"
            exit 1
          fi
          echo "path=$xpi" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            ${{ steps.xpi.outputs.path }}
            dist/browseabroad-chrome.zip
